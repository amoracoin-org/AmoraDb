name: Native CI and Prebuilds

on:
  push:
    branches: [main, native]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm64
            platform: linux
            arch: arm64
          - os: macos-13
            platform: darwin
            arch: x64
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: windows-latest
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Native Addon
        working-directory: npm
        run: npm run build

      - name: Run tests
        run: node test.js

      - name: Upload prebuild
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.platform }}-${{ matrix.arch }}
          path: npm/build/Release/*.node
          if-no-files-found: error
          retention-days: 7

  build-android-termux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build Android (Termux arm64) prebuild
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            termux/termux-docker:aarch64 \
            bash -lc "
              pkg update -y &&
              pkg install -y nodejs-lts python make clang git &&
              cd npm &&
              npm install --ignore-scripts &&
              npm run build
            "

      - name: Upload prebuild android-arm64
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-android-arm64
          path: npm/build/Release/*.node
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [build, build-android-termux]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all prebuilds
        uses: actions/download-artifact@v4
        with:
          path: prebuilds
          pattern: prebuild-*
          merge-multiple: false

      - name: Place prebuilds into npm package
        run: |
          mkdir -p npm/prebuilds
          for dir in prebuilds/prebuild-*/; do
            base=$(basename "$dir")
            triplet=${base#prebuild-}
            mkdir -p "npm/prebuilds/$triplet"
            cp "$dir"*.node "npm/prebuilds/$triplet/amoradb.node"
          done
          find npm/prebuilds -maxdepth 2 -type f -name "*.node" -print

      - name: Validate required prebuilds
        run: |
          required=(
            "win32-x64"
            "linux-x64"
            "linux-arm64"
            "darwin-x64"
            "darwin-arm64"
            "android-arm64"
          )
          missing=0
          for t in "${required[@]}"; do
            if [ ! -f "npm/prebuilds/$t/amoradb.node" ]; then
              echo "::error::Missing required prebuild: $t"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::Release blocked: required prebuilds are missing."
            exit 1
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: npm/prebuilds/**/*
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js (publish)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies (publish)
        run: npm ci

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
